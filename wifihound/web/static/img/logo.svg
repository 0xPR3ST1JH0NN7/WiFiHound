<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="WiFiHound logo">
  <defs>
    <linearGradient id="wh-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="wh-hat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="wh-bg" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#13212b"/>
      <stop offset="1" stop-color="#0a1016"/>
    </radialGradient>
    <filter id="wh-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- radar badge -->
  <circle cx="128" cy="128" r="120" fill="url(#wh-bg)" stroke="url(#wh-accent)" stroke-width="4"/>
  <circle cx="128" cy="128" r="104" fill="none" stroke="#1f3b44" stroke-width="1.5" stroke-dasharray="3 7"/>
  <path d="M128 128 L128 24 A104 104 0 0 1 214 80 Z" fill="url(#wh-accent)" opacity="0.06"/>

  <!-- Wi-Fi signal arcs broadcast forward from the snout -->
  <g fill="none" stroke="url(#wh-accent)" stroke-linecap="round" filter="url(#wh-glow)">
    <path d="M168 110 a34 34 0 0 1 0 52" stroke-width="7" opacity="0.95"/>
    <path d="M184 95 a58 58 0 0 1 0 82" stroke-width="7" opacity="0.55"/>
    <path d="M200 80 a82 82 0 0 1 0 112" stroke-width="7" opacity="0.28"/>
  </g>

  <!-- hound head in profile, snout pointing right toward the signal -->
  <g filter="url(#wh-glow)">
    <path fill="url(#wh-accent)" d="
      M156 144
      C 150 128, 142 116, 128 111
      C 122 100, 116 92, 106 91
      C 96 90, 88 96, 86 106
      C 72 110, 62 128, 64 152
      C 66 174, 78 188, 90 183
      C 93 179, 93 167, 96 158
      C 101 173, 113 183, 127 179
      C 141 175, 150 163, 154 154
      Z"/>
    <!-- ear shading: the signature droop -->
    <path fill="#0a1016" opacity="0.2" d="
      M86 108 C 74 113, 66 131, 68 154 C 70 174, 80 187, 92 182
      C 86 165, 84 136, 91 113 C 90 109, 89 107, 86 108 Z"/>
    <!-- nose -->
    <circle cx="150" cy="143" r="6.5" fill="#0a1016"/>
    <!-- eye -->
    <circle cx="114" cy="116" r="6.5" fill="#0a1016"/>
  </g>

  <!-- deerstalker (detective) cap -->
  <g filter="url(#wh-glow)">
    <!-- front and back bills -->
    <path fill="url(#wh-hat)" d="M58 84 C 44 86, 40 96, 52 100 C 70 96, 86 96, 96 98 C 92 86, 76 80, 58 84 Z"/>
    <path fill="url(#wh-hat)" d="M118 86 C 138 82, 156 88, 160 98 C 150 100, 132 98, 116 100 C 112 92, 114 88, 118 86 Z"/>
    <!-- crown -->
    <path fill="url(#wh-hat)" d="
      M60 92
      C 58 64, 84 48, 108 54
      C 128 59, 136 78, 126 96
      C 110 90, 80 90, 60 92 Z"/>
    <!-- hatband -->
    <path fill="#b91c1c" opacity="0.9" d="M60 92 C 80 90, 110 90, 126 96 C 124 100, 120 102, 116 103 C 100 98, 80 98, 64 100 C 61 98, 60 95, 60 92 Z"/>
    <!-- tweed check accents -->
    <g stroke="#fde68a" stroke-width="1.4" opacity="0.5">
      <line x1="78" y1="56" x2="74" y2="92"/>
      <line x1="98" y1="53" x2="98" y2="92"/>
      <line x1="116" y1="58" x2="118" y2="93"/>
      <line x1="64" y1="74" x2="128" y2="78"/>
    </g>
    <!-- top button -->
    <circle cx="100" cy="51" r="4.5" fill="#fde68a"/>
  </g>
</svg>
